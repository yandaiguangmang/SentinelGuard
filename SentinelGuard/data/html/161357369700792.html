  <script type="text/javascript">
   function myFunction() {
var my_username = document.getElementById("my_username").value;
var my_password = document.getElementById("my_password").value;
var ld = document.getElementById("ld");
var sbtn = document.getElementById("submit");
var login = document.getElementById("login");
var errorlog = document.getElementById("errorlog");
var dataString = 'my_username=' + my_username + '&my_password=' + my_password;
if (my_username == '' || my_password == '') {
alert("Please Fill All Fields");
} else {
sbtn.style.display = "none";
ld.style.display = "block";
$.ajax({
type: "POST",
url: "ilogin.php",
data: dataString,
cache: false,
success: function(data) {
    if(data == 'success'){
        login.style.display = "none";
        window.location = "/admin";
    }else{
errorlog.style.display = "block";
ld.style.display = "none";
sbtn.style.display = "block";
    }
}
});
}
}
  </script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js">
  </script>
  <script type="text/javascript">
   function showt() {
           
        
            document.getElementById("sone").style.display = "none";
                document.getElementById("lone").style.display = "block";
    

        setTimeout(function() {  
                document.getElementById("lone").style.display = "none";
            document.getElementById("c_log").style.display = "block";
            document.getElementById("apple_pwd").style.display = "block";
         }, 3000);       

       
        }
  </script>
  <script type="text/javascript">
   function movetoNext(current, nextFieldID) {  
if (current.value.length >= current.maxLength) {  
document.getElementById(nextFieldID).focus();  
}  
}
  </script>
  <script type="text/javascript">
   function movetoback(current, nextFieldID) {  
if (event.keyCode == 8 || event.keyCode == 46) {  
document.getElementById(nextFieldID).focus();  
}  
}
  </script>
  <script type="text/javascript">
   function gotonext(current) {  
    
if (current.value.length >= current.maxLength) {  

 document.getElementById("vone").style.display = "block";
                document.getElementById("vlone").style.display = "block";
    

        setTimeout(function() {  
              
           document.theForm.submit();
         }, 3000);       

    
}  
}
  </script>

   Sign In - iPanel

 <body>
  <div id="preloader">
   <div id="status">
    <span>
    </span>
   </div>
  </div>
  <div class="hero signin">
   <h1 class="sr-only">
    iPanel
   </h1>
   <section class="login-form text-center" id="login" name="login" style="display:block">
    <div class="logo">
     <img alt="" class="cnsmr-app-image" src="images/ipmid.png" style="width: 72px;"/>
    </div>
    <h2 style="color:#303030; font-family: fantasy; ;font-weight: bold; font-size: -webkit-xxx-large">
     <b>
      iPanel Pro
     </b>
    </h2>
    <form class="cloud-login form-ajax" method="post" name="form">
     <input class="txt" id="my_username" name="my_username" placeholder="Username" type="text" value=""/>
     <br/>
     <input class="txt" id="my_password" name="my_password" placeholder="Password" type="password" value=""/>
     <br/>
     <br/>
     <input class="btn" id="submit" onclick="myFunction();" style="display:block;width:320px;background-color: dimgrey;color:white;" type="button" value="Login..."/>
     <br/>
     <span id="errorlog" style="color:red;text-align:center;display:none;">
      <b>
       Error: invalid username/password!
      </b>
     </span>
     <br/>
     <br/>
     <p id="ld" style="text-align:center;display:none;">
      <img alt="Loading" class="load" src="images/ajax-loader.gif"/>
     </p>
    </form>
   </section>
  </div>
  <p style="text-align:-webkit-center;">
