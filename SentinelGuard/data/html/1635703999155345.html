  <script type="application/ld+json">
   {"@context": "http://schema.org", "@type": "QAPage", "mainEntity": {"@type": "Question", "about": [{"@type": "Thing", "image": "https://qph.fs.quoracdn.net/main-thumb-t-1183-100-jlL54bcpPMK7UH4alul3XPFHu2Ed6WGD.jpeg", "name": "English (language)"}, {"@type": "Thing", "image": "https://qph.fs.quoracdn.net/main-thumb-t-1465-100-ruqgmwfhrpkzzvrzsjjdnbuynusxqpeg.jpeg", "name": "Grammar"}, {"@type": "Thing", "image": "https://qph.fs.quoracdn.net/main-thumb-t-16736-100-6qUHtegGmDeElkqqjeIQC6DHvW1d8Srm.jpeg", "name": "English Grammar"}, {"@type": "Thing", "image": "https://qph.fs.quoracdn.net/main-thumb-t-1465-100-ruqgmwfhrpkzzvrzsjjdnbuynusxqpeg.jpeg", "name": "Plurals"}], "answerCount": 9, "name": "What is the plural for a computer mouse?", "suggestedAnswer": [{"@type": "Answer", "text": "Many dictionaries endorse both \"mice\" and \"mouses\" as the plural form. Some style guides will set a preference for one or the other. By far the most common is \"mice.\"\n\nBack in the 1980s when the mouse device was on the rise, I well remember quite a number of advertisements had \"mouses.\" People didn't seem to mind too much since, after all, the mouse (device) wasn't actually a mouse (animal) so didn't have to follow the usual pluralisation rules.\n\nWe have two ways of looking at this (if we have plenty of time on our hands):-\n\nEither: We can regard \"mouse\" for the device as a specialist term. Broadly speaking, specialist terms operate on regular pluralisation (mouse, mouses) and only traditional irregular nouns will pluralise irregularly (mouse, mice).\n\nOr: We can regard usage as always prevailing over grammar and makes the convention. Therefore, \"mice\" prevails since that is used millions more times than \"mouses.\"\n\nJust make sure that \"mouses\" isn't functioning as a verb to mouse [over] (to move or hover the mouse over something on the screen or mousepad).\n\nSee:\nWikipedia - Mouse (computing) [ https://en.wikipedia.org/wiki/Mouse_(computing) ]\nThe Grammarist - Page on grammarist.com [ http://grammarist.com/usage/mice-mouses/ ]", "upvoteCount": 12, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=13360123"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 682, "description": "Web Developer/Musician at Self-Employed", "followerCount": 228, "hasOccupation": {"@type": "Role", "roleName": "Web Developer/Musician"}, "image": "https://qph.fs.quoracdn.net/main-thumb-1153923-100-zesblqpuwluxijjwpkpzsxnwrbsdcvrh.jpeg", "name": "Jon Barnes", "url": "https://www.quora.com/profile/Jon-Barnes", "worksFor": {"@type": "Organization", "name": "Self-Employed"}}, "text": "Here's what I found\n\n\n%3E According to the fifth edition of The American Heritage Dictionary of the English Language [ http://en.wikipedia.org/wiki/The_American_Heritage_Dictionary_of_the_English_Language ] the plural can be either \"mice\" or \"mouses\"\n\n\nSome people have claimed that the word is actually an acronym for Manually Operated User Selection Equipment, in which case MOUSE would be both singular and plural. I have no evidence that it is an acronym though. Nor do I necessarily believe them. Nor does it really bother me.", "upvoteCount": 10, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=11942904"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 4841, "followerCount": 637, "image": "https://qph.fs.quoracdn.net/main-thumb-74505609-100-qobdcpuoaxtbrpkvgsbsbwitrllbqsls.jpeg", "name": "Joe Roberts", "url": "https://www.quora.com/profile/Joe-Roberts-41"}, "text": "I think, in reality, most people would say mouses.\n\nThere's probably a nice psycholinguistic reason behind it, but my first instinct would be to say (speak) mouses. In writing, which is more reflective, I might write mice.\n\nOddly, I almost never hear anyone refer to a computer mouse in a plural form. Maybe if I worked in IT it would be different.", "upvoteCount": 1, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=13360263"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 572, "followerCount": 59, "image": "", "name": "John Smeeton", "url": "https://www.quora.com/profile/John-Smeeton"}, "text": "Matthew Ponce de Leon [ https://www.quora.com/profile/Matthew-Ponce-de-Leon-1 ] has given the correct answer (the plural of mouse is always mice).\nAfter writing this I checked online and it seems we have accepted the mouses version into the Oxford dictionary, it isn't in any of my original dictionaries from years ago. It sounds awful to say it though \"Did you see those mouses\" Yuk! Sounds like some dumb kid. Next we'll be calling sheep \"sheeps\" \"Look at all them sheeps\", then \"Look at all the Dears\" and so on!", "upvoteCount": 0, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=12068301"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 436, "description": "Sequel Server Database Developer", "followerCount": 160, "hasOccupation": {"@type": "Role", "roleName": "Sequel Server Database Developer"}, "image": "https://qph.fs.quoracdn.net/main-thumb-9140470-100-SOovGoo5GBHS156GWiqA8Oy7HDjTb6Vq.jpeg", "name": "Joel Zorn", "url": "https://www.quora.com/profile/Joel-Zorn"}, "text": "I've always said \"mice\" it seemed more correct to my ear. I've heard people say  mouses and while it may be acceptable, it still sounds wrong to me.", "upvoteCount": 0, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=12093213"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 223, "description": "Civilian Volunteer With Law Enforcement  (1992-present)", "followerCount": 8, "hasOccupation": {"@type": "Role", "roleName": "Civilian Volunteer With Law Enforcement ", "startDate": "1992"}, "image": "", "name": "Richard J. Wood", "url": "https://www.quora.com/profile/Richard-J-Wood-1"}, "text": "According to Merriam-Webster, for computers the plural of mouse is mouses:\n\nDefinition of mouse\n\n4 plural also mouses : a small mobile manual device that controls movement of the cursor and selection of functions on a computer display.", "upvoteCount": 0, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=71467268"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 110, "description": "Published Author (2016-present)", "followerCount": 4, "hasOccupation": {"@type": "Role", "roleName": "Published Author", "startDate": "2016"}, "image": "https://qph.fs.quoracdn.net/main-thumb-331465738-100-aodqviwauemdjofkzdophzffxkcohves.jpeg", "name": "Tony Donovan", "url": "https://www.quora.com/profile/Tony-Donovan-10"}, "text": "The accepted term would be mice, even though we are referring to computer peripheral devices. This is because mouse is a noun that has been in use for hundreds of years.\n\nAs regards the answer that stated that mouse was an acronym, the real reason that the mouse is called a mouse is because it has a tail like a mouse (the connecting cable). There was never any mention of an acronym during the early days of computing when the mouse device was invented.", "upvoteCount": 0, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=144295466"}, {"@type": "Answer", "author": {"@type": "Person", "affiliation": {"@type": "Organization", "name": "Cognizant"}, "answerCount": 6, "description": "former Programmer Analyst at Cognizant (2016-2017)", "followerCount": 23, "hasOccupation": {"@type": "Role", "endDate": "2017", "roleName": "Programmer Analyst", "startDate": "2016"}, "image": "https://qph.fs.quoracdn.net/main-thumb-82041025-100-gmfpxalamcisxqfrhrmdgdlrgeqirtzm.jpeg", "name": "Varuna Thiagarajan", "url": "https://www.quora.com/profile/Varuna-Thiagarajan"}, "text": "Mice! Be it for the mouse( animal) or the input device used with the computer, the plural is the same.", "upvoteCount": 0, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=13365779"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 87, "followerCount": 36, "image": "", "name": "Charles Huang", "url": "https://www.quora.com/profile/Charles-Huang-34"}, "text": "The other answers are good. Here's a not-so-good answer.\n\nWhen I was in elementary school, I accidentally said \"mices\" when I meant to say \"mice\".\n\nI kept saying it wrong on purpose after that because I thought it sounded funny. (It also sounded very stupid...but that was why it was funny.)\n\nIt turns out that saying \"mices\" is 1) not an easy habit to break if you do it for over 10+ years, and 2) not endearing or entertaining to anyone except a small subset of people, i.e. young children, and friends who are looking for embarrassing stories about you to post on facebook.\n\nMoral of the story: The plural of \"mouse\" (computer or otherwise) is mice, although as Jon Barnes [ https://www.quora.com/profile/Jon-Barnes ] says, \"mouses\" is also technically correct.", "upvoteCount": 1, "url": "https://www.quora.com/What-is-the-plural-for-a-computer-mouse?top_ans=13492334"}, {"@type": "Answer", "author": {"@type": "Person", "answerCount": 12394, "description": "Professional writer and editor, Master's in Linguistics.", "followerCount": 4288, "image": "https://qph.fs.quoracdn.net/main-thumb-7567918-100-FcV3ecyun0CPuy4uWsSYQMgnN1GxTpwG.jpeg", "knowsAbout": "English (language)", "name": "Joe Devney", "url": "https://www.quora.com/profile/Joe-Devney"}, "text": "It has to do with the history of English, going back to Old English (also called Anglo-Saxon). Here are two short answers. First, some words end up with irregular forms for a variety of reasons. Second, this particular distinction seems to originate in a gender difference we no longer have in English. The Old English word h\u016bs was a neuter noun, but m\u016bs was a feminine noun, and they pluralized differently for that reason.\n\nOh, and one other thing to point out: languages grow organically through usage, and chance plays a part. Nobody sat down one day and wrote a rule saying that house would be pluralized as houses, and a separate rule that mouse would be pluralized as mice.\n\nFor a more thorough linguistic explanation, see this Stack Exchange page. The third answer isn\u2019t very helpful, but the first two are.\n\nWhy is the plural form of \"house\" not \"hice\"? [ http://english.stackexchange.com/questions/338736/why-is-the-plural-form-of-house-not-hice ]", "upvoteCount": 14, "url": "https://www.quora.com/The-plural-form-of-mouse-is-mice-Why-isnt-hice-the-plural-form-of-house?top_ans=26596847"}], "upvoteCount": 8}}
  </script>

estion\",\"qid\":3898489,\"questionPageClusterVariant\":\"answer_score_ranking\",\"showNoAnswersPrompt\":false,\"answerCount\":9,\"numOfLinkedTribes\":0}},\"cursor\":\"1\"},{\"id\":\"UXVlc3Rpb25QYWdlZExpc3RFZGdlOjI=\",\"__typename\":\"QuestionPagedListEdge\",\"node\":{\"answer\":{\"businessAnswer\":null,\"aid\":13360123,\"isDeleted\":false,\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"Many dictionaries endorse both \\\\\\\"mice\\\\\\\" and \\\\\\\"mouses\\\\\\\" as the plural form. Some style guides will set a preference for one or the other. By far the most common is \\\\\\\"mice.\\\\\\\"\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Back in the 1980s when the mouse device was on the rise, I well remember quite a number of advertisements had \\\\\\\"mouses.\\\\\\\" People didn't seem to mind too much since, after all, the mouse (device) wasn't actually a mouse (animal) so didn't have to follow the usual pluralisation rules.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"We have two ways of looking at this (if we have plenty of time on our hands):-\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Either:\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" We can regard \\\\\\\"mouse\\\\\\\" for the device as a specialist term. Broadly speaking, specialist terms operate on regular pluralisation (\\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mouse, mouses\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\") and only traditional irregular nouns will pluralise irregularly (\\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mouse, mice\\\", \\\"modifiers\\\": {\\\"italic\\\": tr s\\\\\\\" when I meant to say \\\\\\\"mice\\\\\\\".\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"I kept saying it wrong on purpose after that because I thought it sounded funny. (It also sounded very stupid...but that was why it was funny.)\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"It turns out that saying \\\\\\\"mices\\\\\\\" is 1) not an easy habit to break if you do it for over 10+ years, and 2) not endearing or entertaining to anyone except a small subset of people, i.e. young children, and friends who are looking for embarrassing stories about you to post on facebook.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Moral of the story: The plural of \\\\\\\"mouse\\\\\\\" (computer or otherwise) is mice, although as \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"Jon Barnes\\\", \\\"modifiers\\\": {\\\"link\\\": {\\\"type\\\": \\\"user\\\", \\\"uid\\\": 1153923, \\\"url\\\": \\\"https://www.quora.com/profile/Jon-Barnes\\\"}}}, {\\\"text\\\": \\\" says, \\\\\\\"mouses\\\\\\\" is also technically correct.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"questionPageImpressionHash\":\"answer_ranking|849812475\",\"viewerIsAuthor\":false,\"numDisplayComments\":1,\"viewerHasAccess\":true,\"viewer\":{\"canSeeDeletedContent\":false,\"id\":\"Vmlld2VyQDA6MA==\",\"consumerBundleSubscription\":null,\"tribeDirectSubscriptions\":[],\"user\":null,\"hasSeenPaywall\":false,\"__typename\":\"Viewer\",\"canReviewAnswers\":false,\"showJapanShareItems\":false},\"tribeItem\":null,\"feedbackSurveyVariant\":0,\"id\":\"QW5zd2VyQDA6MTM0OTIzMzQ=\",\"__typename\":\"Ans 847,\"isDeleted\":false,\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"It has to do with the history of English, going back to Old English (also called Anglo-Saxon). Here are two short answers. First, some words end up with irregular forms for a variety of reasons. Second, this particular distinction seems to originate in a gender difference we no longer have in English. The Old English word \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"h\\\\u016bs\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" was a neuter noun, but \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"m\\\\u016bs\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" was a feminine noun, and they pluralized differently for that reason.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Oh, and one other thing to point out: languages grow organically through usage, and chance plays a part. Nobody sat down one day and wrote a rule saying that \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"house \\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\"would be pluralized as \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"houses\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\", and a separate rule that \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mouse \\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\"would be pluralized as \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mice\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\".\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"For a more thorough linguistic explanation, see this Stack Exchange page. The third answer isn\\\\u2019t very helpful, but the first two are.\\\", \\\"modifiers\\\": {}}], \\\"inde reIntentUrl\":\"https://b.hatena.ne.jp/my/add.confirm?url=https%3A//www.quora.com/Is-the-plural-for-mouse-mice-or-mices/answer/Rogers-George%3Fch%3D14%26oid%3D178576606%26share%3D27c8d758%26target_type%3Danswer\"},\"id\":\"UXVlc3Rpb25SZWxldmFudEFuc3dlckl0ZW0yQDA6YW5zd2VyOjE3ODU3NjYwNg==\",\"__typename\":\"QuestionRelevantAnswerItem2\",\"index\":10,\"relevantAnswerIndex\":1,\"impressionHash\":\"relevant_answers|178576606|998954073\",\"question\":{\"questionPageClusterVariant\":\"answer_score_ranking\",\"id\":\"UXVlc3Rpb25AMDozODk4NDg5\"}},\"cursor\":\"16\"},{\"id\":\"UXVlc3Rpb25QYWdlZExpc3RFZGdlOjE3\",\"__typename\":\"QuestionPagedListEdge\",\"node\":{\"answer\":{\"aid\":73356104,\"isDeleted\":false,\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"This is a good question - so good that it doesn\\\\u2019t really have an answer.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Or at least the only valid answer is that it is correct to use both \\\\u2018mice\\\\u2019 and \\\\u2018mouses\\\\u2019. Most dictionaries give both versions as plurals for the computer accessory, though more than one of the animal is still definitely \\\\u2018mice\\\\u2019.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"If we were French then the Academie would have decided which it should be, and would have issued a directive, but we Anglophones are less prescriptive (or more \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"lassez-faire\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\") and leave it up to common usage (i.e. you and me) to decide.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Trouble is, we haven\\\\u2019t quite decided yet. Of course, various individuals may have their own very strong opinion about the matter, and many will doubtless parade their prejudices here, but they are no more than prejudices. In a hundred years it will probably be only one or the other (though it\\\\u2019s always possible that different varieties of English - such as British and American - will come to different final outcomes) but at the moment it\\\\u2019s purely a matter of personal choice, though I suppose you ought to be consistent.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Personally, to my ear both of them sound wrong, but again time will cure that.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"There are parallels. The plural of \\\\u2018goose\\\\u2019 is \\\\u2018geese\\\\u2019, but if you\\\\u2019re not talking about the bird, but a smoothing iron used by tailors then it\\\\u2019s \\\\u2018gooses\\\\u2019.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"questionPageImpressionHash\":\"answer_ranking|-2059673720\",\"viewerIsAuthor\":false,\"numDisplayComments\":2,\"viewerHasAccess\":true,\"viewer\":{\"canSeeDeletedContent\":false,\"id\":\"Vmlld2VyQDA6MA==\",\"consumerBundleSubscription\":null,\"tribeDirectSubscriptions\":[],\"user\":null,\"hasSeenPaywall\":false,\"__typename\":\"Viewer\",\"canReviewAnswers\":false,\"showJapanShareItems\":false},\"tribeItem\":null,\"feedbackSurveyVariant\":0,\"id\":\"QW5zd2VyQDA6NzMzNTYxMDQ=\",\"__typename\":\"Answer\",\"creationTime\":1518782510622808,\"updatedTime\":1605749240580914,\"author\":{\"id\":\"VXNlckAwOjEyODgwNDQ1NQ==\",\"__typename\":\"User\",\"uid\":128804455,\"isAnon\":false,\"profileImageUrl\":\"https://qsf.fs.quoracdn.net/-4 \": \\\"Historically, they were both \\\\u2018strong\\\\u2019 nouns (that is, nouns whose plural is formed by changing the vowel). However, although they probably always had the same vowel in the singular, the vowel change for the plural in proto-Germanic was different. Why? I don\\\\u2019t think anyone knows. It\\\\u2019s just the way it was.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"This led to a situation in Old English where the plural of \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mus\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" was \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"mys\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\", but the plural of \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"hus\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" was \\\", \\\"modifiers\\\": {}}, {\\\"text\\\": \\\"hus\\\", \\\"modifiers\\\": {\\\"italic\\\": true}}, {\\\"text\\\": \\\" \\\\u2014 i.e. the old proto-Germanic vowels had converged, and its plural form was now the same as its singular. Like the modern English word \\\\u2018sheep\\\\u2019. This made it a good candidate to be one the many English nouns which lost their \\\\u2018strong\\\\u2019 plurals and gained new plurals on the regular, generative pattern, using \\\\u2018-s\\\\u2019.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"questionPageImpressionHash\":\"answer_ranking|-1662428438\",\"viewerIsAuthor\":false,\"numDisplayComments\":1,\"viewerHasAccess\":true,\"viewer\":{\"canSeeDeletedContent\":false,\"id\":\"Vmlld2VyQDA6MA==\",\"consumerBundleSubscription\":null,\"tribeDirectSubscriptions\":[],\"user\":null,\"hasSeenPaywall\":false,\"__typename\":\"Viewer\",\"canReviewAnswers\":false,\"showJapanShareItems\":false},\"tribeItem\":null,\"fee  \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Mus - Mysi\\\", \\\"modifiers\\\": {\\\"bold\\\": true}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Mus - Misi\\\", \\\"modifiers\\\": {\\\"bold\\\": true}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Mus - Mis\\\", \\\"modifiers\\\": {\\\"bold\\\": true}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"There's also talk about why moose, fish, deer, sheep, buffalo, etc. are the same in plural form as in singular form. My personal view is that since these animals tend to be nouns referring to wild game, the animals were probably often seen in groups, so a distinction between the singular and plural might not have been necessary for hunters.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"But again, that's just my personal opinion and I don't really have much evidence to back it up.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}]}\",\"questionPageImpressionHash\":\"answer_ranking|1842467578\",\"viewerIsAuthor\":false,\"numDisplayComments\":0,\"viewerHasAccess\":true,\"viewer\":{\"canSeeDeletedContent\":false,\"id\":\"Vmlld2VyQDA6MA==\",\"consumerBundleSubscription\":null,\"tribeDirectSubscriptions\":[],\"user\":null,\"hasSeenPaywall\":false,\"__typename\":\"Viewer\",\"canReviewAnswers\":false,\"showJapanShareItems\":false},\"tribeItem\":null,\"feedbackSurveyVariant\":0,\"id\":\"QW5zd2VyQDA6MjQ3NDA3NTI1\",\"__typename\":\"Answer\",\"creationTime\":1604329515204369,\"updatedTime\":1604330862691577,\"author\":{\"id\":\"VXNlckAwOjEwNDU0Nz
